<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOLIBOT</title>

<!-- 🔥 ESTILOS EXTERNOS -->
<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="chat-container">

    <div class="header">
    <img src="{{ url_for('static', filename='logo.png') }}" class="logo-horizontal">
</div>

    <div id="chat" class="chat-box"></div>

    <div class="quick-actions">
        <button onclick="quick('Quiero cotizar un producto')">Cotizar</button>
        <button onclick="quick('Hola')">Saludo</button>
        <button onclick="quick('Ayuda')">Ayuda</button>
    </div>

    <div class="input-area">
        <input type="text" id="message" placeholder="Escribe tu mensaje...">
        <button onclick="sendMessage()">➤</button>
    </div>

</div>

<script>
function addMessage(text, sender) {
    const chat = document.getElementById("chat");
    const msg = document.createElement("div");
    msg.classList.add("message", sender);
    msg.innerText = text;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
    const chat = document.getElementById("chat");
    const typing = document.createElement("div");
    typing.classList.add("message", "bot", "typing");
    typing.id = "typing";
    typing.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
    chat.appendChild(typing);
    chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
}

function sendMessage() {
    const input = document.getElementById("message");
    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    showTyping();

    fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
    })
    .then(res => res.json())
    .then(data => {
        removeTyping();
        addMessage(data.response, "bot");
    });
}

function quick(text) {
    document.getElementById("message").value = text;
    sendMessage();
}

document.getElementById("message").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
